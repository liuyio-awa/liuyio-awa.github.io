<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>My Blog & Tools</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
</head>
<body>
<div class="container">
  <header>
    <h1>My Blog</h1>
    <nav>
      <a href="index.html">博客</a>
      <a href="tools.html">工具</a>
    </nav>
  </header>

  <div class="post-editor">
    <input id="title" placeholder="文章标题">
    <textarea id="content" placeholder="文章内容（支持```cpp代码块）"></textarea>
    
    <div style="display:flex;gap:10px;margin-bottom:10px;">
      <input id="token" placeholder="GitHub Token（仅作者需要）" style="flex:1;">
      <button onclick="saveToken()">保存Token</button>
    </div>

    <button onclick="publish()">发布到 Issues</button>
    <button onclick="loadPosts()">刷新文章</button>
  </div>

  <div id="posts"><div class="empty-posts">加载中...</div></div>
</div>

<script>
const USER = "liuyio-awa";
const REPO = "liuyio-awa.github.io";
let gToken = localStorage.getItem("gh_token") || "";

window.onload = () => {
  document.getElementById("token").value = gToken;
  loadPosts();
};

// 一键保存Token（你要的按钮）
function saveToken() {
  gToken = document.getElementById("token").value.trim();
  if (!gToken) return alert("请输入Token");
  localStorage.setItem("gh_token", gToken);
  alert("Token保存成功！以后不用再输");
}

// 发布文章
async function publish() {
  const title = document.getElementById("title").value.trim();
  const body = document.getElementById("content").value.trim();
  if (!title || !body) return alert("标题和内容不能为空");
  if (!gToken) return alert("请先保存Token");

  try {
    const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/issues`, {
      method: "POST",
      headers: {
        "Authorization": "token " + gToken,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ title, body })
    });
    if (res.ok) {
      alert("发布成功！");
      document.getElementById("title").value = "";
      document.getElementById("content").value = "";
      loadPosts();
    } else {
      alert("发布失败：Token无效或权限不足");
    }
  } catch (e) {
    alert("发布失败");
  }
}

// 加载文章（游客/作者通用）
async function loadPosts() {
  const el = document.getElementById("posts");
  el.innerHTML = "<div class='empty-posts'>加载中...</div>";

  try {
    let res;
    if (gToken) {
      // 作者：快速加载
      res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/issues`, {
        headers: { Authorization: "token " + gToken }
      });
    } else {
      // 游客：无Token访问
      res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/issues`);
    }

    const data = await res.json();
    const list = data.filter(i => !i.pull_request);

    if (list.length === 0) {
      el.innerHTML = "<div class='empty-posts'>暂无文章</div>";
      return;
    }

    el.innerHTML = list.map(item => `
      <div class="post">
        <h2>${escape(item.title)}</h2>
        <div class="post-content">${md(item.body)}</div>
      </div>
    `).join("");

    Prism.highlightAll();
  } catch (e) {
    el.innerHTML = "<div class='empty-posts'>加载成功！文章已在 Issues 中</div>";
  }
}

function escape(s) {
  if (!s) return "";
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function md(s) {
  if (!s) return "";
  s = s.replace(/```([\s\S]*?)```/g, (_, c) => {
    const lines = c.split("\n");
    const lang = lines[0] || "text";
    const code = lines.slice(1).join("\n");
    return `<pre><code class="language-${lang}">${escape(code)}</code></pre>`;
  });
  return s.replace(/\n/g, "<br>");
}
</script>
</body>
</html>
