<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>My Blog & Tools</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
</head>
<body>
<div class="container">
  <header>
    <h1>My Blog</h1>
    <nav>
      <a href="index.html">博客</a>
      <a href="tools.html">工具</a>
    </nav>
  </header>

  <div class="post-editor">
    <input id="title" placeholder="文章标题">
    <textarea id="content" placeholder="文章内容（支持代码块）"></textarea>
    <input id="token" placeholder="GitHub Token（仅本地保存）">
    <button onclick="publish()">发布到 Issues</button>
    <button onclick="loadPosts()">刷新文章</button>
  </div>

  <div id="posts"><div class="empty-posts">加载中...</div></div>
</div>

<script>
const USER = "liuyio-awa";
const REPO = "liuyio-awa.github.io";
let token = "";

window.onload = () => {
  token = localStorage.getItem("gh_token") || "";
  document.getElementById("token").value = token;
  loadPosts();
};

// 发布文章 用token POST 不受跨域影响
async function publish() {
  const title = document.getElementById("title").value.trim();
  const body = document.getElementById("content").value.trim();
  const tk = document.getElementById("token").value.trim();

  if (!title || !body) return alert("标题和内容不能为空");
  if (!tk) return alert("请填写 GitHub Token");

  token = tk;
  localStorage.setItem("gh_token", token);

  try {
    const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/issues`, {
      method: "POST",
      headers: {
        "Authorization": "token " + token,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ title, body })
    });
    if (res.ok) {
      alert("发布成功！");
      document.getElementById("title").value = "";
      document.getElementById("content").value = "";
      loadPosts();
    } else {
      alert("发布失败，检查Token权限");
    }
  } catch (e) {
    alert("发布请求异常");
  }
}

// JSONP 回调，接收Issues数据
function renderIssues(data) {
  const el = document.getElementById("posts");
  // 过滤掉PR，只留普通文章Issue
  const list = data.filter(item => !item.pull_request);

  if (list.length === 0) {
    el.innerHTML = "<div class='empty-posts'>暂无文章</div>";
    return;
  }

  let html = "";
  list.forEach(item => {
    html += `
    <div class="post">
      <h2>${escapeHtml(item.title)}</h2>
      <div class="post-content">${renderMd(item.body || "")}</div>
    </div>
    `;
  });
  el.innerHTML = html;
  Prism.highlightAll();
}

// JSONP 加载 根治跨域
function loadPosts() {
  const el = document.getElementById("posts");
  el.innerHTML = "<div class='empty-posts'>加载中...</div>";
  // 移除旧脚本
  const oldScript = document.getElementById("jsonpScript");
  if (oldScript) oldScript.remove();

  // 新建JSONP脚本
  const script = document.createElement("script");
  script.id = "jsonpScript";
  script.src = `https://api.github.com/repos/${USER}/${REPO}/issues?callback=renderIssues`;
  document.body.appendChild(script);
}

function escapeHtml(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;")
          .replace(/</g,"&lt;")
          .replace(/>/g,"&gt;");
}

function renderMd(s) {
  if (!s) return "";
  s = s.replace(/```([\s\S]*?)```/g, (_, code) => {
    const lines = code.split("\n");
    const lang = lines[0] || "text";
    const c = lines.slice(1).join("\n");
    return `<pre><code class="language-${lang}">${escapeHtml(c)}</code></pre>`;
  });
  return s.replace(/\n/g, "<br>");
}
</script>
</body>
</html>
