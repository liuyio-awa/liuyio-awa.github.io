<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub JSON 留言板 · 暗黑 · Markdown+LaTeX</title>

    <!-- ========== 外部依赖 ========== -->
    <!-- Markdown 解析 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- KaTeX 样式 & 核心库 & 自动渲染插件 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/contrib/auto-render.min.js"></script>

    <!-- Octokit (GitHub REST API) -->
    <script src="https://cdn.jsdelivr.net/npm/@octokit/rest@20.0.2/dist-bundle/octokit.min.js"></script>

    <style>
        /* ===== 全局暗色主题 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-body: #0d1117;
            --bg-card: #161b22;
            --bg-input: #0d1117;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --btn-green: #238636;
            --btn-green-hover: #2ea043;
            --btn-danger: #da3633;
            --btn-danger-hover: #f85149;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --radius: 12px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            font-family: var(--font);
            background: var(--bg-body);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
        }
        .app {
            width: 100%;
            max-width: 860px;
            height: 95vh;
            max-height: 820px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶栏 */
        .header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 8px;
            background: var(--bg-card);
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header h1 small {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-muted);
            background: var(--border-color);
            padding: 0 10px;
            border-radius: 12px;
        }
        .header-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .header-actions button {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .header-actions button:hover {
            background: var(--border-color);
            color: var(--text-primary);
        }
        .header-actions .config-btn {
            border-color: var(--accent);
            color: var(--accent);
        }
        .header-actions .config-btn:hover {
            background: var(--accent);
            color: #0d1117;
        }

        /* 公告栏 */
        .announcement-bar {
            background: #1f2937;
            border-bottom: 2px solid var(--accent);
            padding: 8px 20px;
            display: none;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            font-size: 14px;
        }
        .announcement-bar.show {
            display: flex;
        }
        .announcement-bar .pin-icon {
            color: var(--accent);
            font-size: 18px;
        }
        .announcement-bar .announce-content {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .announcement-bar .close-announce {
            cursor: pointer;
            color: var(--text-muted);
            background: none;
            border: none;
            font-size: 18px;
            padding: 0 4px;
        }
        .announcement-bar .close-announce:hover {
            color: var(--text-primary);
        }

        /* 搜索栏 */
        .search-bar {
            padding: 8px 20px;
            background: var(--bg-body);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }
        .search-bar input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 6px 16px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
        }
        .search-bar input:focus {
            border-color: var(--accent);
        }
        .search-bar input::placeholder {
            color: var(--text-muted);
        }
        .search-bar .clear-search {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 0 4px;
        }
        .search-bar .clear-search:hover {
            color: var(--text-primary);
        }

        /* 消息列表 */
        .message-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg-body);
            scroll-behavior: smooth;
        }
        .msg {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            animation: fadeUp 0.25s ease;
        }
        .msg .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
            background: #2d333b;
            color: var(--text-primary);
            text-transform: uppercase;
        }
        .msg .bubble {
            flex: 1;
            background: var(--bg-card);
            padding: 10px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            word-break: break-word;
        }
        .msg .bubble .meta {
            display: flex;
            gap: 12px;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            flex-wrap: wrap;
        }
        .msg .bubble .meta .author {
            font-weight: 600;
            color: var(--text-primary);
        }
        .msg .bubble .meta .time {
            color: var(--text-muted);
        }
        .msg .bubble .meta .badge-pin {
            background: var(--accent);
            color: #0d1117;
            font-size: 10px;
            font-weight: 700;
            padding: 0 8px;
            border-radius: 10px;
        }
        .msg .bubble .content {
            font-size: 15px;
            line-height: 1.6;
        }
        .msg .bubble .content p {
            margin: 0 0 6px 0;
        }
        .msg .bubble .content p:last-child {
            margin-bottom: 0;
        }
        /* KaTeX 暗色适配 */
        .msg .bubble .content .katex .mathnormal {
            color: var(--text-primary);
        }
        .msg .bubble .content .katex .mord {
            color: var(--text-primary);
        }
        .msg .bubble .content code {
            background: #1c2128;
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.9em;
            color: #f0f6fc;
        }
        .msg .bubble .content pre {
            background: #1c2128;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 6px 0;
        }
        .msg .bubble .content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 12px;
            color: var(--text-secondary);
            margin: 6px 0;
        }
        .msg .bubble .actions {
            margin-top: 8px;
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            border-top: 1px solid var(--border-color);
            padding-top: 6px;
        }
        .msg .bubble .actions button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 4px;
            transition: 0.2s;
        }
        .msg .bubble .actions .del-btn:hover {
            background: var(--btn-danger);
            color: #fff;
        }
        .empty-state {
            text-align: center;
            padding: 40px 0;
            color: var(--text-muted);
            font-size: 15px;
        }

        /* 底部输入 */
        .input-area {
            padding: 12px 20px 16px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-card);
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .input-area .input-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }
        .input-area .input-group .name-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        .input-area .input-group .name-row input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 12px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: border 0.2s;
            min-width: 60px;
        }
        .input-area .input-group .name-row input:focus {
            border-color: var(--accent);
        }
        .input-area .input-group textarea {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 15px;
            resize: none;
            font-family: var(--font);
            outline: none;
            transition: border 0.2s;
            min-height: 44px;
            max-height: 120px;
            line-height: 1.5;
        }
        .input-area .input-group textarea:focus {
            border-color: var(--accent);
        }
        .input-area .input-group textarea::placeholder {
            color: var(--text-muted);
        }
        .input-area .send-btn {
            background: var(--btn-green);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 10px 24px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s;
            height: 44px;
            white-space: nowrap;
        }
        .input-area .send-btn:hover {
            background: var(--btn-green-hover);
        }
        .input-area .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pin-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid transparent;
            transition: 0.2s;
            white-space: nowrap;
        }
        .pin-toggle:hover {
            background: var(--border-color);
        }
        .pin-toggle input[type="checkbox"] {
            accent-color: var(--accent);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* 配置模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 28px 32px;
            max-width: 480px;
            width: 90%;
            box-shadow: var(--shadow);
        }
        .modal h2 {
            font-size: 20px;
            margin-bottom: 6px;
        }
        .modal .sub {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 16px;
        }
        .modal label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-top: 14px;
            margin-bottom: 4px;
        }
        .modal input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }
        .modal input:focus {
            border-color: var(--accent);
        }
        .modal .hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .modal .actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: flex-end;
        }
        .modal .actions button {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .modal .actions .btn-primary {
            background: var(--accent);
            color: #0d1117;
        }
        .modal .actions .btn-primary:hover {
            background: var(--accent-hover);
        }
        .modal .actions .btn-secondary {
            background: var(--border-color);
            color: var(--text-primary);
        }
        .modal .actions .btn-secondary:hover {
            background: #484f58;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .message-list::-webkit-scrollbar {
            width: 6px;
        }
        .message-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .message-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 8px;
        }
        .message-list::-webkit-scrollbar-thumb:hover {
            background: #484f58;
        }

        @media (max-width: 600px) {
            .app {
                height: 100vh;
                max-height: none;
                border-radius: 0;
                border: none;
            }
            .header h1 {
                font-size: 16px;
            }
            .input-area {
                padding: 10px 12px 12px;
            }
            .input-area .send-btn {
                padding: 8px 16px;
                font-size: 14px;
                height: 40px;
            }
            .modal {
                padding: 20px;
            }
            .announcement-bar {
                font-size: 13px;
                padding: 6px 16px;
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">

        <!-- 顶栏 -->
        <header class="header">
            <h1>💬 留言板 <small>Markdown + LaTeX</small></h1>
            <div class="header-actions">
                <button id="refreshBtn">🔄 刷新</button>
                <button class="config-btn" id="configBtn">⚙️ 配置</button>
            </div>
        </header>

        <!-- 公告栏 -->
        <div class="announcement-bar" id="announceBar">
            <span class="pin-icon">📌</span>
            <span class="announce-content" id="announceContent"></span>
            <button class="close-announce" id="closeAnnounce">✕</button>
        </div>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 搜索消息内容 / 昵称..." />
            <button class="clear-search" id="clearSearch">✕</button>
        </div>

        <!-- 消息列表 -->
        <div class="message-list" id="messageList">
            <div class="empty-state">💡 点击「配置」连接仓库，开始留言</div>
        </div>

        <!-- 底部输入 -->
        <div class="input-area">
            <div class="input-group">
                <div class="name-row">
                    <input type="text" id="nickInput" placeholder="昵称" maxlength="20" value="访客" />
                    <label class="pin-toggle">
                        <input type="checkbox" id="pinCheckbox" /> 📌 置顶
                    </label>
                </div>
                <textarea id="msgInput" rows="1" placeholder="支持 Markdown &amp; LaTeX ( $$ 块级公式 $$ 或 \( 行内公式 \) )"></textarea>
            </div>
            <button class="send-btn" id="sendBtn">发送</button>
        </div>
    </div>

    <!-- 配置模态框 -->
    <div class="modal-overlay" id="configModal">
        <div class="modal">
            <h2>⚙️ 仓库配置</h2>
            <div class="sub">数据存储在 <strong>liuyio-awa/liuyio-awa.github.io</strong> 的 <code>posts.json</code></div>
            <label>GitHub Token</label>
            <input type="password" id="tokenInput" placeholder="ghp_xxxx..." />
            <div class="hint">需勾选 <strong>repo</strong> 全部权限</div>
            <label>默认昵称</label>
            <input type="text" id="defaultNickInput" placeholder="访客" />
            <div class="actions">
                <button class="btn-secondary" id="modalCancel">取消</button>
                <button class="btn-primary" id="modalSave">保存并连接</button>
            </div>
        </div>
    </div>

    <!-- ========== 加载分离的 JavaScript ========== -->
    <script src="script.js"></script>
</body>
</html>
