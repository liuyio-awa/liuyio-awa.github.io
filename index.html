<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>My Blog & Tools</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.bootcdn.net/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <script src="https://cdn.bootcdn.net/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/prism/1.29.0/components/prism-html.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/octokit/2.0.14/octokit.min.js"></script>
</head>
<body>
<div class="container">
  <header>
    <h1>My Blog</h1>
    <nav>
      <a href="index.html">博客</a>
      <a href="tools.html">工具</a>
    </nav>
  </header>

  <div class="tag-filter">
    <span>筛选标签：</span>
    <div id="tagList" class="tag-list"></div>
    <button onclick="showAllPosts()" class="filter-btn">全部</button>
  </div>

  <div class="post-editor">
    <input id="title" placeholder="文章标题">
    <input id="tags" placeholder="文章标签（用逗号分隔，如：C++,博客,工具）">
    <textarea id="content" placeholder="写点什么...（支持代码高亮，用 ```语言 包裹代码）"></textarea>
    
    <div style="background:#222; padding:10px; border-radius:6px; margin:10px 0;">
      <input id="githubToken" placeholder="GitHub Token（仅本地保存，不上传）">
    </div>

    <button onclick="savePostToGithub()">发布文章</button>
  </div>

  <div id="posts" class="posts"></div>
</div>

<script>
  let octokit;
  let allPosts = [];
  let allTags = new Set();
  const REPO = "liuyio-awa.github.io";
  const BRANCH = "main";

  window.onload = async function () {
    document.getElementById("githubToken").value = localStorage.getItem("ghToken") || "";
    await loadPostsFromGithub();
    renderTags();
  };
</script>
<script src="script.js"></script>
</body>
</html>
