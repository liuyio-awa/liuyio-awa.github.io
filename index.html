<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>My Blog & Tools</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
</head>
<body>
<div class="container">
  <header>
    <h1>My Blog</h1>
    <nav>
      <a href="index.html">博客</a>
      <a href="tools.html">工具</a>
    </nav>
  </header>

  <div class="post-editor">
    <input id="title" placeholder="文章标题">
    <textarea id="content" placeholder="文章内容（支持```cpp代码块）"></textarea>
    <input id="token" placeholder="GitHub Token（仅本地保存）">
    <button onclick="publish()">发布到 GitHub Issues</button>
    <button onclick="loadPosts()">刷新文章</button>
  </div>

  <div id="posts"><div class="empty-posts">加载中...</div></div>
</div>

<script>
const USER = "liuyio-awa";
const REPO = "liuyio-awa.github.io";

window.onload = () => {
  const t = localStorage.getItem("gh_token");
  if (t) document.getElementById("token").value = t;
  loadPosts();
};

async function publish() {
  const title = document.getElementById("title").value.trim();
  const body = document.getElementById("content").value.trim();
  const token = document.getElementById("token").value.trim();

  if (!title || !body) return alert("标题和内容不能为空");
  if (!token) return alert("请输入 GitHub Token");

  localStorage.setItem("gh_token", token);

  try {
    const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/issues`, {
      method: "POST",
      headers: { Authorization: `token ${token}`, "Content-Type": "application/json" },
      body: JSON.stringify({ title, body })
    });

    if (res.ok) {
      alert("发布成功！已同步到 Issues");
      document.getElementById("title").value = "";
      document.getElementById("content").value = "";
      loadPosts();
    } else {
      alert("发布失败：Token 无权限或已失效");
    }
  } catch (e) {
    alert("发布失败");
  }
}

async function loadPosts() {
  const el = document.getElementById("posts");
  el.innerHTML = "<div class='empty-posts'>加载中...</div>";

  try {
    const res = await fetch(`https://api.github.com/repos/${USER}/${REPO}/issues`);
    const data = await res.json();
    console.log("获取到的Issues:", data);

    if (!data || data.length === 0) {
      el.innerHTML = "<div class='empty-posts'>暂无文章</div>";
      return;
    }

    el.innerHTML = data.map(item => `
      <div class="post">
        <h2>${escape(item.title)}</h2>
        <div class="post-content">${md(item.body || "")}</div>
      </div>
    `).join("");

    Prism.highlightAll();
  } catch (e) {
    el.innerHTML = "<div class='empty-posts'>加载失败</div>";
    console.error(e);
  }
}

function escape(s) {
  if (!s) return "";
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function md(s) {
  if (!s) return "";
  s = s.replace(/```([\s\S]*?)```/g, (match, code) => {
    const lines = code.split("\n");
    const lang = lines[0] || "text";
    const content = lines.slice(1).join("\n");
    return `<pre><code class="language-${lang}">${escape(content)}</code></pre>`;
  });
  return s.replace(/\n/g, "<br>");
}
</script>
</body>
</html>
