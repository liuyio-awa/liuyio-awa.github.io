<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>C++ 在线对拍工具</title>
  <link rel="stylesheet" href="style.css">
  <!-- 代码高亮 Prism.js 样式（修复CDN报错，确保稳定加载） -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-cpp.min.js"></script>
  <!-- 修复 WebContainer 解析失败，改用 Emscripten 方案（替换失效CDN，选用稳定版本） -->
  <script src="https://cdn.jsdelivr.net/npm/emscripten@3.1.45/dist/emscripten.min.js"></script>
</head>
<body>
<div class="container">
  <header>
    <h1>C++ 在线对拍</h1>
    <nav>
      <a href="index.html">博客</a>
      <a href="tools.html">工具</a>
    </nav>
  </header>

  <div class="tool-container">
    <div class="code-box">
      <h3>标准代码 std</h3>
      <textarea id="stdCode" placeholder="输入正确代码（C++）"></textarea>
      <pre class="code-preview"><code class="language-cpp" id="stdPreview"></code></pre>
    </div>
    <div class="code-box">
      <h3>你的代码</h3>
      <textarea id="yourCode" placeholder="输入你的代码（C++）"></textarea>
      <pre class="code-preview"><code class="language-cpp" id="yourPreview"></code></pre>
    </div>
    <div class="code-box">
      <h3>随机数据生成</h3>
      <textarea id="randCode" placeholder="输入数据生成代码（C++）"></textarea>
      <pre class="code-preview"><code class="language-cpp" id="randPreview"></code></pre>
    </div>
    <button class="run-btn" onclick="startCheck()">开始对拍</button>
    <div class="result" id="result"></div>
  </div>
</div>
<script src="checker.js"></script>
</body>
</html>
